name: Update Percentiles

on:
  schedule:
    - cron: '30 9 * * 1-5'   # 16:30 VN (UTC+7), thứ 2–6
  workflow_dispatch:           # nút Run manual trên GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore 1m CSV cache
        uses: actions/cache@v4
        with:
          path: data/vietstock/
          key: vietstock-1m-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            vietstock-1m-${{ runner.os }}-

      - name: Install dependencies
        run: pip install numpy requests

      - name: Build percentiles
        run: python build_percentiles.py

      - name: Commit percentiles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/percentiles.json
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "chore: update percentiles [skip ci]" && git push)
