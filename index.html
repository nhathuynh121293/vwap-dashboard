<script>
const VN_OFFSET=7*3600;
const DEFAULT_PROXY='https://proxy.nhathuynh1293.workers.dev';
const CFG={symbols:['ACB','VCB','HPG','FPT'],k:2.0,tf:5,refresh:15,atrPeriod:14,zoneLevel:'auto',bandOn:true,proxy:localStorage.getItem('ssi-proxy')||DEFAULT_PROXY};

// ======== HELPERS ========
function getTodayStartUTC(){
  const now=new Date();
  const vnNow=new Date(now.getTime()+VN_OFFSET*1000);
  return Date.UTC(vnNow.getUTCFullYear(),vnNow.getUTCMonth(),vnNow.getUTCDate(),0,0,0)/1000;
}

function fmtVol(v){
  if(!v||v<=0) return '—';
  if(v>=1e6) return (v/1e6).toFixed(1)+'M';
  if(v>=1e3) return (v/1e3).toFixed(0)+'K';
  return v.toString();
}

// ======== ZONES (init_zones logic) ========
const WINDOW_SIZE=252;
const TRANS_FEE=0.027/100;

function roundPrice(price, side){
  // HOSE price steps: <10k→10, 10k-50k→50, >=50k→100
  let step;
  if(price<10000) step=10;
  else if(price<50000) step=50;
  else step=100;
  if(side==='buy') return Math.floor(price/step)*step;
  if(side==='sell') return Math.ceil(price/step)*step;
  return Math.round(price/step)*step;
}

function calcZones(dailyCandles, todayOpen){
  // dailyCandles: array of {time,open,high,low,close} from 1D API
  // todayOpen: today's open price (raw API unit) or null
  const n=dailyCandles.length;
  if(n<200) return null;

  // Find today's date boundary (VN timezone)
  const now=new Date();
  const vnNow=new Date(now.getTime()+VN_OFFSET*1000);
  const todayStartSec=Date.UTC(vnNow.getUTCFullYear(),vnNow.getUTCMonth(),vnNow.getUTCDate(),0,0,0)/1000;

  // Filter out today's candle (use only closed candles for vol calc)
  const past=dailyCandles.filter(c=>c.time<todayStartSec);
  if(past.length<200) return null;

  // Compute rolling log-return std (volatility)
  const closes=past.map(c=>c.close);
  const logRet=closes.map((c,i)=>i>0?Math.log(c/closes[i-1]):0);
  logRet[0]=NaN;

  // Rolling std of last WINDOW_SIZE log returns
  const validRets=logRet.slice(-WINDOW_SIZE).filter(v=>!isNaN(v));
  if(validRets.length<200) return null;
  const mean=validRets.reduce((a,b)=>a+b,0)/validRets.length;
  const variance=validRets.reduce((a,v)=>a+(v-mean)**2,0)/validRets.length;
  const vol=Math.sqrt(variance);
  if(vol<=0) return null;

  // Previous day OHLC (last closed candle) — multiply by 1000 to VND
  const prev=past[past.length-1];
  const prevHigh=prev.high*1000;
  const prevLow=prev.low*1000;
  const prevClose=prev.close*1000;
  const realOpen=todayOpen?todayOpen*1000:0;

  // Ref calculation (gap up/down logic from init_zones.py)
  let ref;
  if(realOpen===0) ref=prevClose;
  else if(realOpen>=prevHigh||realOpen<=prevLow) ref=realOpen;
  else ref=(prevHigh+prevLow+prevClose)/3;

  // Band width factors
  const bidFactor=(vol/2)+(2*TRANS_FEE);
  const askFactor=(vol/2)+TRANS_FEE;

  const bid1=ref*(1-bidFactor);
  const ask1=ref*(1+askFactor);
  const width=ask1-bid1;

  return {
    ref:   roundPrice(ref)/1000,
    bid1:  roundPrice(bid1,'buy')/1000,
    ask1:  roundPrice(ask1,'sell')/1000,
    bid2:  roundPrice(bid1-0.6*width,'buy')/1000,
    ask2:  roundPrice(ask1+0.6*width,'sell')/1000,
    bid3:  roundPrice(bid1-1.5*width,'buy')/1000,
    ask3:  roundPrice(ask1+1.5*width,'sell')/1000,
    vol:   +(vol*100).toFixed(2), // % for display
    date:  prev.time
  };
}

// Cache zones in localStorage — 1 calc per symbol per day
function getVNDateStr(){
  const now=new Date();
  const vn=new Date(now.getTime()+VN_OFFSET*1000);
  return vn.getUTCFullYear()+'-'+String(vn.getUTCMonth()+1).padStart(2,'0')+'-'+String(vn.getUTCDate()).padStart(2,'0');
}
function getCachedZones(sym){
  try{
    const key='zones_'+sym+'_'+getVNDateStr();
    const raw=localStorage.getItem(key);
    if(!raw) return null;
    const z=JSON.parse(raw);
    // After 9:15 AM VN, if cache was computed without open, invalidate
    const now=new Date();
    const vnHour=(now.getUTCHours()+7)%24;
    const vnMin=now.getUTCMinutes();
    if(vnHour>=9&&vnMin>=15&&!z._hasOpen) return null;
    return z;
  }catch(e){return null;}
}
function setCachedZones(sym, zones, hasOpen){
  try{
    const key='zones_'+sym+'_'+getVNDateStr();
    zones._hasOpen=hasOpen;
    localStorage.setItem(key,JSON.stringify(zones));
    // Clean old keys (keep only today)
    const today=getVNDateStr();
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('zones_')&&!k.endsWith(today)) localStorage.removeItem(k);
    }
  }catch(e){}
}

async function fetchDaily(sym){
  try{
    const proxy=CFG.proxy.replace(/\/$/,'');
    const now=Math.floor(Date.now()/1000);
    const from=now-86400*730; // 2 years
    const r=await fetch(`${proxy}?resolution=1D&symbol=${sym}&from=${from}&to=${now}`);
    const j=await r.json();
    if(j.code!=='SUCCESS'||!j.data?.t) return null;
    return j.data.t.map((t,i)=>({time:t+VN_OFFSET,open:j.data.o[i],high:j.data.h[i],low:j.data.l[i],close:j.data.c[i],volume:j.data.v[i]}));
  }catch(e){console.warn('Daily API fail:',sym,e);return null;}
}

async function loadZones(sym){
  // Check cache first
  const cached=getCachedZones(sym);
  if(cached) return cached;

  // Fetch daily data
  const daily=await fetchDaily(sym);
  if(!daily||daily.length<200) return null;

  // Get today's open from the live 1m data if available
  const todayStart=getTodayStartUTC();
  let todayOpen=null;
  // Find today's candle in daily data
  const todayDaily=daily.find(c=>c.time>=todayStart);
  if(todayDaily) todayOpen=todayDaily.open;

  const zones=calcZones(daily, todayOpen);
  if(zones){
    setCachedZones(sym, zones, todayOpen!==null);
  }
  return zones;
}

// ======== REGIME INDICATORS ========
const RVOL_MAX_DAYS=5;
const VSLOPE_WINDOW_MIN=60;

// VWAP Slope — linear regression on 1m VWAP (TF-independent)
function calcVWAPSlope(v1mDisplay, atr){
  if(!v1mDisplay.length||!atr||atr<=0) return null;
  const totalSpan=(v1mDisplay[v1mDisplay.length-1].time - v1mDisplay[0].time)/60;
  if(totalSpan<15) return null;
  const cutoff=v1mDisplay[v1mDisplay.length-1].time - VSLOPE_WINDOW_MIN*60;
  const pts=v1mDisplay.filter(p=>p.time>=cutoff);
  const n=pts.length;
  if(n<3) return null;
  const t0=pts[0].time;
  let sx=0,sy=0,sxy=0,sx2=0;
  for(let i=0;i<n;i++){
    const x=(pts[i].time-t0)/60;
    const y=pts[i].value;
    sx+=x; sy+=y; sxy+=x*y; sx2+=x*x;
  }
  const denom=n*sx2-sx*sx;
  if(denom===0) return 0;
  const slope=(n*sxy-sx*sy)/denom;
  return +(slope/atr).toFixed(4);
}

// RVOL — Relative Volume (cumulative, time-of-day matched)
function calcRVOL(tc, displayStart){
  const displayCandles=tc.filter(c=>c.time>=displayStart);
  const prevCandles=tc.filter(c=>c.time<displayStart);
  if(!displayCandles.length||!prevCandles.length) return null;
  const displayCumVol=displayCandles.reduce((s,c)=>s+c.volume,0);
  const latestTOD=displayCandles[displayCandles.length-1].time%86400;
  const days={};
  for(const c of prevCandles){
    const dayKey=Math.floor(c.time/86400);
    if(!days[dayKey]) days[dayKey]=[];
    days[dayKey].push(c);
  }
  const dayKeys=Object.keys(days).map(Number).sort((a,b)=>b-a).slice(0,RVOL_MAX_DAYS);
  const prevVols=[];
  for(const dk of dayKeys){
    let vol=0;
    for(const c of days[dk]){
      if((c.time%86400)<=latestTOD) vol+=c.volume;
    }
    if(vol>0) prevVols.push(vol);
  }
  if(!prevVols.length) return null;
  const avgPrevVol=prevVols.reduce((a,b)=>a+b,0)/prevVols.length;
  return avgPrevVol>0 ? +(displayCumVol/avgPrevVol).toFixed(2) : null;
}

// VWAP Cross Frequency
function calcXF(tc, displayStart){
  let xf=0, prevSide=null;
  for(const c of tc){
    if(c.time<displayStart) continue;
    if(c._vwap===undefined) continue;
    const side=c.close>c._vwap?1:-1;
    if(prevSide!==null&&side!==prevSide) xf++;
    prevSide=side;
  }
  return xf;
}

// Regime: SIDEWAYS / TRENDING / UNCERTAIN
function getRegime(vslope, rvol){
  if(vslope===null) return 'UNCERTAIN';
  const slopeFlat=Math.abs(vslope)<0.008;
  const rvolHigh=rvol!==null&&rvol>=2.0;
  if(slopeFlat&&!rvolHigh) return 'SIDEWAYS';
  if(!slopeFlat) return 'TRENDING';
  return 'UNCERTAIN';
}

// Color helpers
function vsColor(vs){
  if(vs===null) return 'var(--t3)';
  const a=Math.abs(vs);
  if(a<0.008) return 'var(--green)';
  if(a<0.015) return 'var(--yellow)';
  return 'var(--red)';
}
function rvolColor(rvol){
  if(rvol===null) return 'var(--t3)';
  if(rvol<1.5) return 'var(--green)';
  if(rvol<2.0) return 'var(--yellow)';
  return 'var(--red)';
}
function xfColor(xf){
  if(xf>=3) return 'var(--green)';
  if(xf>=1) return 'var(--yellow)';
  return 'var(--t3)';
}

// ======== DATA ENGINE ========
function agg(d,tf){
  if(tf===1)return d.map(c=>({...c}));
  const bk={};
  for(const c of d){const bt=Math.floor(c.time/(tf*60))*(tf*60);if(!bk[bt])bk[bt]={time:bt,open:c.open,high:c.high,low:c.low,close:c.close,volume:c.volume};else{const b=bk[bt];b.high=Math.max(b.high,c.high);b.low=Math.min(b.low,c.low);b.close=c.close;b.volume+=c.volume;}}
  return Object.values(bk).sort((a,b)=>a.time-b.time);
}

function calcVWAP(d){
  let cv=0,ct=0;
  return d.map((c,i)=>{
    const curDay=Math.floor(c.time/86400);
    const prevDay=i>0?Math.floor(d[i-1].time/86400):-1;
    if(i>0&&curDay!==prevDay){cv=0;ct=0;}
    const tp=(c.high+c.low+c.close)/3;
    ct+=tp*c.volume;cv+=c.volume;
    return{time:c.time,value:cv>0?ct/cv:c.close};
  });
}

function smpVWAP(v1m,tfc,tf){
  return tfc.map(c=>{let val=c.close;for(const v of v1m){if(v.time>=c.time&&v.time<c.time+tf*60)val=v.value;}return{time:c.time,value:+val.toFixed(4)};});
}

function calcATR(d,p){
  const a=2/(p+1);let atr=null;
  return d.map((c,i)=>{let tr;if(i===0){tr=c.high-c.low;atr=tr;}else{const pc=d[i-1].close,gap=c.time-d[i-1].time;tr=gap>5400?(c.high-c.low):Math.max(c.high-c.low,Math.abs(c.high-pc),Math.abs(c.low-pc));atr=a*tr+(1-a)*atr;}return{time:c.time,value:atr};});
}

function process(raw,tf,k,ap){
  const v1=calcVWAP(raw),tc=agg(raw,tf),vt=smpVWAP(v1,tc,tf),at=calcATR(tc,ap);
  const todayStart=getTodayStartUTC();

  // Display day fallback: if no candles today, use last trading day
  const hasTodayData=tc.some(c=>c.time>=todayStart);
  let displayStart=todayStart;
  if(!hasTodayData&&tc.length>0){
    const lastTime=tc[tc.length-1].time;
    displayStart=lastTime-(lastTime%86400);
  }

  const cd=[],vl=[],ul=[],ll=[],vd=[];
  let ld=0,lv=0,la=0,lp=0,lu=0,lo=0,tv=0;
  let prevSide=null, xf=0;

  for(let i=0;i<tc.length;i++){
    const c=tc[i],v=vt[i].value,a=at[i].value;
    const up=+(v+k*a).toFixed(2),dn=+(v-k*a).toFixed(2),dev=a>0?(c.close-v)/a:0;
    const isDisplay=c.time>=displayStart;

    cd.push({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close});
    vd.push({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(52,211,153,0.35)':'rgba(248,113,113,0.35)'});

    // Attach vwap value for XF calculation
    tc[i]._vwap=v;

    if(isDisplay){
      vl.push({time:c.time,value:+v.toFixed(2)});
      ul.push({time:c.time,value:up});
      ll.push({time:c.time,value:dn});
      tv+=c.volume;

      // VWAP cross frequency
      const side=c.close>v?1:-1;
      if(prevSide!==null&&side!==prevSide) xf++;
      prevSide=side;
    }

    ld=dev;lv=v;la=a;lp=c.close;lu=up;lo=dn;
  }

  // Regime indicators — VSlope uses 1m VWAP (TF-independent)
  const v1mDisplay=v1.filter(p=>p.time>=displayStart);
  const vslope=calcVWAPSlope(v1mDisplay,la);
  const rvol=calcRVOL(tc,displayStart);
  const regime=getRegime(vslope,rvol);

  return{
    candles:cd,vwapLine:vl,upperLine:ul,lowerLine:ll,volData:vd,displayStart,
    m:{dev:ld,vwap:lv,atr:la,price:lp,upper:lu,lower:lo,vol:tv,vslope,rvol,xf,regime}
  };
}

// ======== API ========
let fetchOK=true;
async function fetchSSI(sym,from,to){
  try{
    const proxy=CFG.proxy.replace(/\/$/,'');
    const r=await fetch(`${proxy}?resolution=1&symbol=${sym}&from=${from}&to=${to}`);
    const j=await r.json();
    if(j.code!=='SUCCESS'||!j.data?.t)return null;
    if(!fetchOK){fetchOK=true;hideWarn();}
    return j.data.t.map((t,i)=>({time:t+VN_OFFSET,open:j.data.o[i],high:j.data.h[i],low:j.data.l[i],close:j.data.c[i],volume:j.data.v[i]}));
  }catch(e){console.warn('API fail:',sym,e);if(fetchOK){fetchOK=false;showWarn();}return null;}
}
async function fetchLive(sym){const now=Math.floor(Date.now()/1000);return await fetchSSI(sym,now-7*86400,now);}

// ======== WARNING ========
function showWarn(){document.getElementById('warn').classList.add('show');}
function hideWarn(){document.getElementById('warn').classList.remove('show');}
document.getElementById('proxy-save').addEventListener('click',()=>{const v=document.getElementById('proxy-input').value.trim();if(!v)return;CFG.proxy=(v.startsWith('http')?v:'https://'+v);localStorage.setItem('ssi-proxy',CFG.proxy);fetchOK=true;hideWarn();loadAll();});
document.getElementById('warn-close').addEventListener('click',hideWarn);

// ======== THEME ========
function getThemeColors(){
  const light=document.documentElement.getAttribute('data-theme')==='light';
  return light?{
    bg:'#f5f5f0',text:'#7a7a7a',grid:'rgba(180,175,165,0.3)',
    cross:'rgba(8,145,178,0.2)',crossLbl:'#ddd9d0',
    scaleBorder:'#c5c0b6',scaleText:'#4a4a4a',
    up:'#059669',dn:'#dc2626'
  }:{
    bg:'#080c14',text:'#64748b',grid:'rgba(30,42,66,0.3)',
    cross:'rgba(34,211,238,0.2)',crossLbl:'#1c2740',
    scaleBorder:'#1e2a42',scaleText:'#94a3b8',
    up:'#34d399',dn:'#f87171'
  };
}

// ======== CHART PANEL ========
class Panel{
  constructor(cid,sym,idx){
    this.sym=sym;this.idx=idx;this.raw=[];
    this.cell=document.getElementById(cid);
    this.ch=null;this.cs=null;this.vs=null;this.ws=null;this.us=null;this.ls=null;
    this.initialized=false;
    this._hasData=false;
    this.zones=null;this.zoneSeries=[];
    this.build();
  }

  build(){
    const i=this.idx;
    this.cell.innerHTML=`
<div class="cell-head mono">
  <div style="display:flex;align-items:center;gap:8px">
    <input class="sym-input mono" value="${this.sym}" maxlength="6" id="si-${i}">
    <span class="dot dot-live" id="dt-${i}"></span>
  </div>
  <div class="price-info mono">
    <span class="price-main" id="pr-${i}" style="color:var(--neutral)">—</span>
    <span id="pc-${i}" style="font-size:12px;color:var(--t3)"></span>
  </div>
</div>
<div class="chart-wrap" id="cw-${i}"></div>
<div class="dev-badge dev-neutral mono" id="db-${i}"><small>DEV</small>—</div>
<div class="metrics mono">
  <span><span class="ml">VWAP </span><span class="mv" style="color:var(--yellow)" id="mv-${i}">—</span></span>
  <span><span class="ml">ATR </span><span class="mv" style="color:var(--cyan)" id="ma-${i}">—</span></span>
  <span><span class="ml">Vol </span><span class="mv" id="mV-${i}">—</span></span>
  <span><span class="ml">Band </span><span class="mv" style="color:var(--t2)" id="mb-${i}">—</span></span>
  <div class="msep"></div>
  <span class="regime-lbl regime-uncertain" id="mrg-${i}">—</span>
  <span><span class="ml">VS </span><span class="mv" id="mer-${i}">—</span></span>
  <span><span class="ml">RVOL </span><span class="mv" id="madx-${i}">—</span></span>
  <span><span class="ml">XF </span><span class="mv" id="mxf-${i}">—</span></span>
</div>`;
    document.getElementById(`si-${i}`).addEventListener('change',e=>{this.sym=e.target.value.toUpperCase();e.target.value=this.sym;this.initialized=false;this._hasData=false;this.zones=null;this.load();});
    this.mkChart();
  }

  mkChart(){
    const el=document.getElementById(`cw-${this.idx}`);
    const t=getThemeColors();
    this.ch=LightweightCharts.createChart(el,{
      layout:{background:{color:t.bg},textColor:t.text,fontSize:11,fontFamily:'JetBrains Mono'},
      grid:{vertLines:{color:t.grid},horzLines:{color:t.grid}},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:t.cross,width:1,style:2,labelBackgroundColor:t.crossLbl},horzLine:{color:t.cross,width:1,style:2,labelBackgroundColor:t.crossLbl}},
      rightPriceScale:{borderColor:t.scaleBorder,scaleMargins:{top:0.06,bottom:0.22},textColor:t.scaleText},
      timeScale:{borderColor:t.scaleBorder,timeVisible:true,secondsVisible:false,rightOffset:5},
      localization:{timeFormatter:ts=>{const d=new Date(ts*1000);return d.getUTCHours().toString().padStart(2,'0')+':'+d.getUTCMinutes().toString().padStart(2,'0');}},
    });
    this.cs=this.ch.addCandlestickSeries({upColor:t.up,downColor:t.dn,borderUpColor:t.up,borderDownColor:t.dn,wickUpColor:t.up+'88',wickDownColor:t.dn+'88'});
    this.vs=this.ch.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol'});
    this.ch.priceScale('vol').applyOptions({scaleMargins:{top:0.78,bottom:0}});
    this.ws=this.ch.addLineSeries({color:'#facc15',lineWidth:2,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:true,crosshairMarkerRadius:3});
    this.us=this.ch.addLineSeries({color:t.dn+'b3',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    this.ls=this.ch.addLineSeries({color:t.up+'b3',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});

    // Zone line series: [B1, B2, B3, A1, A2, A3]
    // Bid = cyan/blue, Ask = orange/amber — distinct from ATR bands (red/green)
    const zoneOpts=[
      {color:'rgba(34,211,238,0.85)',  lineWidth:2, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(34,211,238,0.70)',  lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(34,211,238,0.55)',  lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(251,146,60,0.85)',  lineWidth:2, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(251,146,60,0.70)',  lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(251,146,60,0.55)',  lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted},
    ];
    this.zoneSeries=zoneOpts.map(o=>this.ch.addLineSeries({...o,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false,title:''}));

    // Ref line (pivot center)
    this.refSeries=this.ch.addLineSeries({color:'rgba(148,163,184,0.45)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false,title:''});

    // Scroll wheel zoom on price scale
    const chart=this.ch;
    let margins={top:0.06,bottom:0.22};
    el.addEventListener('wheel',e=>{
      const rect=el.getBoundingClientRect();
      if(e.clientX < rect.right-55) return;
      e.preventDefault();
      const delta=e.deltaY>0?0.02:-0.02;
      margins.top=Math.max(0.01,Math.min(0.4,margins.top+delta));
      margins.bottom=Math.max(0.05,Math.min(0.5,margins.bottom+delta));
      chart.priceScale('right').applyOptions({autoScale:true,scaleMargins:{top:margins.top,bottom:margins.bottom}});
    },{passive:false});

    new ResizeObserver(()=>{this.ch.applyOptions({width:el.clientWidth,height:el.clientHeight});}).observe(el);
  }

  applyTheme(){
    const t=getThemeColors();
    this.ch.applyOptions({
      layout:{background:{color:t.bg},textColor:t.text},
      grid:{vertLines:{color:t.grid},horzLines:{color:t.grid}},
      crosshair:{vertLine:{color:t.cross,labelBackgroundColor:t.crossLbl},horzLine:{color:t.cross,labelBackgroundColor:t.crossLbl}},
      rightPriceScale:{borderColor:t.scaleBorder,textColor:t.scaleText},
      timeScale:{borderColor:t.scaleBorder},
    });
    this.cs.applyOptions({upColor:t.up,downColor:t.dn,borderUpColor:t.up,borderDownColor:t.dn,wickUpColor:t.up+'88',wickDownColor:t.dn+'88'});
    this.us.applyOptions({color:t.dn+'b3'});
    this.ls.applyOptions({color:t.up+'b3'});
  }

  async load(){
    const data=await fetchLive(this.sym);
    if(data&&data.length){this.raw=data;document.getElementById(`dt-${this.idx}`).className='dot dot-live';}
    else{document.getElementById(`dt-${this.idx}`).className='dot dot-err';}
    // Load zones (cached or computed — 1x per day per symbol)
    if(!this.zones) this.zones=await loadZones(this.sym);
    this.render();
  }

  render(){
    if(!this.raw.length)return;
    const{candles,vwapLine,upperLine,lowerLine,volData,displayStart,m}=process(this.raw,CFG.tf,CFG.k,CFG.atrPeriod);
    const i=this.idx;

    // Incremental update: setData first time, update() after
    if(!this._hasData){
      this.cs.setData(candles);
      this.vs.setData(volData);
      this.ws.setData(vwapLine);
      if(CFG.bandOn){
        this.us.setData(upperLine);
        this.ls.setData(lowerLine);
      } else {
        this.us.setData([]);
        this.ls.setData([]);
      }
      this._hasData=true;
    } else {
      if(candles.length){
        this.cs.update(candles[candles.length-1]);
        this.vs.update(volData[volData.length-1]);
      }
      if(vwapLine.length) this.ws.update(vwapLine[vwapLine.length-1]);
      if(CFG.bandOn){
        if(upperLine.length) this.us.update(upperLine[upperLine.length-1]);
        if(lowerLine.length) this.ls.update(lowerLine[lowerLine.length-1]);
      } else {
        this.us.setData([]);
        this.ls.setData([]);
      }
    }

    // Price header
    const pct=m.vwap?((m.price-m.vwap)/m.vwap*100):0;
    const col=pct>0?'var(--green)':pct<0?'var(--red)':'var(--neutral)';
    document.getElementById(`pr-${i}`).textContent=m.price.toFixed(2);
    document.getElementById(`pr-${i}`).style.color=col;
    document.getElementById(`pc-${i}`).textContent=(pct>=0?'+':'')+pct.toFixed(2)+'%';
    document.getElementById(`pc-${i}`).style.color=col;

    // Metrics bar — left side
    document.getElementById(`mv-${i}`).textContent=m.vwap.toFixed(2);
    document.getElementById(`ma-${i}`).textContent=m.atr.toFixed(3);
    document.getElementById(`mV-${i}`).textContent=fmtVol(m.vol);
    document.getElementById(`mb-${i}`).textContent=m.lower.toFixed(2)+' – '+m.upper.toFixed(2);

    // Metrics bar — regime section
    const rgEl=document.getElementById(`mrg-${i}`);
    rgEl.textContent=m.regime;
    rgEl.className='regime-lbl '+(
      m.regime==='SIDEWAYS'  ? 'regime-sideways'  :
      m.regime==='TRENDING' ? 'regime-trending' : 'regime-uncertain'
    );

    const vsEl=document.getElementById(`mer-${i}`);
    vsEl.textContent=m.vslope!==null?m.vslope.toFixed(3):'—';
    vsEl.style.color=vsColor(m.vslope);

    const rvolEl=document.getElementById(`madx-${i}`);
    rvolEl.textContent=m.rvol!==null?m.rvol.toFixed(1)+'x':'—';
    rvolEl.style.color=rvolColor(m.rvol);

    const xfEl=document.getElementById(`mxf-${i}`);
    xfEl.textContent=m.xf;
    xfEl.style.color=xfColor(m.xf);

    // DEV badge — dim when trending (signal less reliable)
    const db=document.getElementById(`db-${i}`);
    const dev=m.dev;
    let z='NEUTRAL',dc='dev-neutral';
    if(dev<=-CFG.k){z='LONG ZONE';dc='dev-long';}
    else if(dev>=CFG.k){z='SHORT ZONE';dc='dev-short';}
    db.className='dev-badge mono '+dc+(m.regime==='TRENDING'?' dimmed':'');
    db.innerHTML=`<small>${z}</small>${dev>=0?'+':''}${dev.toFixed(2)}`;

    // Zone lines (display day)
    if(this.zones && this.zoneSeries.length===6){
      const zn=this.zones;
      const displayCandles=candles.filter(c=>c.time>=displayStart);
      const tStart=displayCandles.length?displayCandles[0].time:displayStart;
      const tEnd=displayCandles.length>1?displayCandles[displayCandles.length-1].time:(tStart+CFG.tf*60);
      const prices=[zn.bid1,zn.bid2,zn.bid3,zn.ask1,zn.ask2,zn.ask3];
      const zl=CFG.zoneLevel;
      const p=m.price;

      let showFlags=[false,false,false,false,false,false];
      if(zl===3){
        showFlags=[true,true,true,true,true,true];
      } else if(zl===1){
        showFlags=[true,false,false,true,false,false];
      } else if(zl==='auto'){
        showFlags[0]=true; showFlags[3]=true;
        if(p<=zn.bid1) showFlags[1]=true;
        if(p<=zn.bid2) showFlags[2]=true;
        if(p>=zn.ask1) showFlags[4]=true;
        if(p>=zn.ask2) showFlags[5]=true;
      }

      const labels=['B1','B2','B3','A1','A2','A3'];
      const mColors=['#22d3ee','#22d3ee','#22d3ee','#fb923c','#fb923c','#fb923c'];
      for(let j=0;j<6;j++){
        if(showFlags[j] && tStart<tEnd){
          this.zoneSeries[j].setData([{time:tStart,value:prices[j]},{time:tEnd,value:prices[j]}]);
          this.zoneSeries[j].setMarkers([{time:tStart,position:'inBar',color:mColors[j],shape:'circle',text:labels[j],size:0}]);
        } else {
          this.zoneSeries[j].setData([]);
          this.zoneSeries[j].setMarkers([]);
        }
      }

      if(zl!==0 && tStart<tEnd){
        this.refSeries.setData([{time:tStart,value:zn.ref},{time:tEnd,value:zn.ref}]);
        this.refSeries.setMarkers([{time:tStart,position:'inBar',color:'#94a3b8',shape:'circle',text:'Ref',size:0}]);
      } else {
        this.refSeries.setData([]);
        this.refSeries.setMarkers([]);
      }
    } else {
      this.zoneSeries.forEach(s=>{s.setData([]);s.setMarkers([]);});
      this.refSeries.setData([]);
      this.refSeries.setMarkers([]);
    }

    // Initial zoom — use displayStart (fallback aware)
    if(!this.initialized&&candles.length>0){
      this.initialized=true;
      let zoomIdx=candles.findIndex(c=>c.time>=displayStart);
      if(zoomIdx<0) zoomIdx=Math.max(0,candles.length-50);
      const fromIdx=Math.max(0,zoomIdx-10);
      this.ch.timeScale().setVisibleLogicalRange({from:fromIdx,to:candles.length+3});
    }
  }
}

// ======== DASHBOARD ========
const panels=[];let rTimer=null;
async function loadAll(){for(const p of panels){await p.load();await new Promise(r=>setTimeout(r,1100));}}
function renderAll(){panels.forEach(p=>{p.initialized=false;p._hasData=false;p.render();});}
function startRefresh(){if(rTimer)clearInterval(rTimer);rTimer=setInterval(()=>loadAll(),CFG.refresh*1000);}

function setupBG(id,cb){document.getElementById(id).addEventListener('click',e=>{if(!e.target.classList.contains('btn'))return;document.getElementById(id).querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');cb(e.target.dataset.v);});}
document.getElementById('k-range').addEventListener('input',e=>{CFG.k=parseFloat(e.target.value);document.getElementById('k-val').textContent=CFG.k.toFixed(1);renderAll();});
document.getElementById('atr-range').addEventListener('input',e=>{CFG.atrPeriod=parseInt(e.target.value);document.getElementById('atr-val').textContent=CFG.atrPeriod;renderAll();});
setupBG('ref-btns',v=>{CFG.refresh=parseInt(v);startRefresh();});
setupBG('tf-btns',v=>{CFG.tf=parseInt(v);renderAll();});
setupBG('zone-btns',v=>{CFG.zoneLevel=isNaN(v)?v:parseInt(v);panels.forEach(p=>{p._hasData=false;p.render();});});
setupBG('band-btns',v=>{CFG.bandOn=v==='1';panels.forEach(p=>{p._hasData=false;p.render();});});

// Theme toggle
const savedTheme=localStorage.getItem('vwap-theme')||'dark';
if(savedTheme==='light'){document.documentElement.setAttribute('data-theme','light');document.getElementById('theme-toggle').textContent='☾';}
document.getElementById('theme-toggle').addEventListener('click',()=>{
  const isLight=document.documentElement.getAttribute('data-theme')==='light';
  const next=isLight?'dark':'light';
  if(next==='light') document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  document.getElementById('theme-toggle').textContent=next==='light'?'☾':'☀';
  localStorage.setItem('vwap-theme',next);
  panels.forEach(p=>p.applyTheme());
});

if(typeof LightweightCharts==='undefined'){
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#94a3b8"><div><h2 style="color:#22d3ee">VWAP.MR</h2><p>Không load được chart library. Cần internet.</p></div></div>';
}else{
  for(let i=0;i<4;i++)panels.push(new Panel('c'+i,CFG.symbols[i],i));
  loadAll();startRefresh();
}
