<style>
  :root {
    --bg0:#080c14;--bg1:#0f1520;--bg2:#161e2e;--bg3:#1c2740;
    --border:#1e2a42;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
    --cyan:#22d3ee;--blue:#3b82f6;--yellow:#facc15;
    --green:#34d399;--red:#f87171;--neutral:#94a3b8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg0);color:var(--t1);font-family:'IBM Plex Sans',sans-serif;height:100vh;overflow:hidden;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .controls{display:flex;align-items:center;gap:16px;padding:7px 16px;background:var(--bg1);border-bottom:1px solid var(--border);height:46px;overflow-x:auto;flex-wrap:nowrap;}
  .logo{font-size:15px;font-weight:700;color:var(--cyan);white-space:nowrap;letter-spacing:-.5px;}.logo span{color:var(--t3);font-weight:400;}
  .sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
  .ctrl{display:flex;align-items:center;gap:7px;white-space:nowrap;}
  .ctrl-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;}
  .ctrl-val{font-size:14px;font-weight:600;color:var(--cyan);min-width:30px;}
  input[type=range]{-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none;width:100px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--cyan);border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(34,211,238,.3);}
  .btn-group{display:flex;}
  .btn{padding:4px 12px;border:1px solid var(--border);background:var(--bg2);color:var(--t2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.3px;}
  .btn:first-child{border-radius:5px 0 0 5px;}.btn:last-child{border-radius:0 5px 5px 0;}
  .btn:not(:first-child){margin-left:-1px;}
  .btn.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
  .btn:hover:not(.on){background:var(--bg3);color:var(--t1);}
  .legend{margin-left:auto;display:flex;gap:14px;font-size:10px;color:var(--t3);align-items:center;flex-shrink:0;letter-spacing:.3px;}
  .legend i{width:16px;height:2.5px;border-radius:1px;display:inline-block;vertical-align:middle;margin-right:4px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;height:calc(100vh - 46px);background:#0c1018;}
  .cell{background:var(--bg0);display:flex;flex-direction:column;position:relative;overflow:hidden;}
  .cell-head{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--bg1);border-bottom:1px solid var(--border);height:36px;flex-shrink:0;}
  .sym-input{width:58px;text-align:center;text-transform:uppercase;font-weight:700;background:var(--bg2);color:var(--t1);border:1px solid var(--border);padding:3px 5px;border-radius:4px;font-size:14px;outline:none;letter-spacing:.5px;}
  .sym-input:focus{border-color:var(--cyan);box-shadow:0 0 4px rgba(34,211,238,.2);}
  .price-info{display:flex;align-items:center;gap:12px;font-size:13px;}
  .price-main{font-weight:700;font-size:15px;}
  /* DEV badge — no longer absolute, removed from chart overlay */
  .dev-badge{position:absolute;top:44px;right:12px;z-index:10;padding:5px 12px;border-radius:8px;font-size:18px;font-weight:700;backdrop-filter:blur(10px);border:1px solid;text-align:center;line-height:1.2;box-shadow:0 2px 12px rgba(0,0,0,.3);transition:opacity .3s;}
  .dev-badge small{font-size:9px;font-weight:600;display:block;opacity:.8;letter-spacing:.8px;margin-bottom:1px;}
  .dev-long{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.25);}
  .dev-short{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.25);}
  .dev-neutral{background:rgba(148,163,184,.08);color:var(--neutral);border-color:rgba(148,163,184,.15);}
  .dev-badge.dimmed{opacity:.2;}
  .chart-wrap{flex:1;min-height:0;}
  /* metrics bar — single row, extended */
  .metrics{display:flex;align-items:center;gap:12px;padding:5px 12px;background:var(--bg1);border-top:1px solid var(--border);height:30px;flex-shrink:0;font-size:11px;letter-spacing:.2px;overflow:hidden;}
  .metrics .ml{color:var(--t3);}.metrics .mv{font-weight:600;}
  .msep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px;}
  /* regime badge inside metrics bar */
  .regime-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;padding:1px 6px;border-radius:3px;border:1px solid;}
  .regime-ranging{color:var(--green);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.07);}
  .regime-trending{color:var(--red);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.07);}
  .regime-uncertain{color:var(--neutral);border-color:rgba(148,163,184,.2);background:rgba(148,163,184,.05);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
  .dot-live{background:var(--green);animation:pulse 2s infinite;box-shadow:0 0 4px rgba(52,211,153,.4);}
  .dot-err{background:var(--red);animation:pulse 1.5s infinite;}
  .warn-banner{display:none;align-items:center;gap:10px;padding:8px 16px;background:#1c1207;border-bottom:1px solid #854d0e;font-size:12px;color:#fbbf24;}
  .warn-banner.show{display:flex;}
  .warn-banner input{background:var(--bg2);color:var(--cyan);border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-size:11px;outline:none;width:280px;}
  .warn-banner input:focus{border-color:var(--cyan);}
  .warn-banner button{padding:3px 12px;background:var(--blue);color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-weight:600;}
  .warn-banner .warn-close{background:none;color:var(--t3);font-size:14px;margin-left:auto;cursor:pointer;border:none;padding:0 4px;}
  ::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:var(--bg0);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>

<body>

<div class="warn-banner mono" id="warn">
  <span>⚠ Không kết nối được API. Nhập proxy URL mới:</span>
  <input id="proxy-input" placeholder="proxy.example.workers.dev">
  <button id="proxy-save">Kết nối</button>
  <button class="warn-close" id="warn-close">✕</button>
</div>

<div class="controls mono">
  <div class="logo">VWAP<span>.MR</span></div><div class="sep"></div>
  <div class="ctrl"><span class="ctrl-label">K</span><input type="range" id="k-range" min="1.0" max="3.0" step="0.1" value="2.0"><span class="ctrl-val" id="k-val">2.0</span></div><div class="sep"></div>
  <div class="ctrl"><span class="ctrl-label">ATR</span><input type="range" id="atr-range" min="7" max="28" step="1" value="14"><span class="ctrl-val" id="atr-val">14</span></div><div class="sep"></div>
  <div class="ctrl"><span class="ctrl-label">Refresh</span><div class="btn-group" id="ref-btns"><button class="btn" data-v="5">5s</button><button class="btn on" data-v="15">15s</button><button class="btn" data-v="30">30s</button></div></div><div class="sep"></div>
  <div class="ctrl"><span class="ctrl-label">Nến</span><div class="btn-group" id="tf-btns"><button class="btn" data-v="1">1m</button><button class="btn on" data-v="5">5m</button><button class="btn" data-v="15">15m</button></div></div><div class="sep"></div>
  <div class="ctrl"><span class="ctrl-label">Zones</span><div class="btn-group" id="zone-btns"><button class="btn on" data-v="1">Z1</button><button class="btn" data-v="3">All</button><button class="btn" data-v="0">Off</button></div></div>
  <div class="legend"><span><i style="background:#facc15"></i>VWAP</span><span><i style="background:#f87171"></i>Upper</span><span><i style="background:#34d399"></i>Lower</span></div>
</div>

<div class="grid"><div class="cell" id="c0"></div><div class="cell" id="c1"></div><div class="cell" id="c2"></div><div class="cell" id="c3"></div></div>

<script>
const VN_OFFSET=7*3600;
const DEFAULT_PROXY='https://proxy.nhathuynh1293.workers.dev';
const CFG={symbols:['ACB','VCB','HPG','FPT'],k:2.0,tf:5,refresh:15,atrPeriod:14,zoneLevel:1,proxy:localStorage.getItem('ssi-proxy')||DEFAULT_PROXY};

// ======== HELPERS ========
function getTodayStartUTC(){
  const now=new Date();
  const vnNow=new Date(now.getTime()+VN_OFFSET*1000);
  return Date.UTC(vnNow.getUTCFullYear(),vnNow.getUTCMonth(),vnNow.getUTCDate(),0,0,0)/1000;
}

function fmtVol(v){
  if(!v||v<=0) return '—';
  if(v>=1e6) return (v/1e6).toFixed(1)+'M';
  if(v>=1e3) return (v/1e3).toFixed(0)+'K';
  return v.toString();
}

// ======== ZONES (init_zones logic) ========
const WINDOW_SIZE=252;
const TRANS_FEE=0.027/100;

function roundPrice(price, side){
  // HOSE price steps: <10k→10, 10k-50k→50, >=50k→100
  let step;
  if(price<10000) step=10;
  else if(price<50000) step=50;
  else step=100;
  if(side==='buy') return Math.floor(price/step)*step;
  if(side==='sell') return Math.ceil(price/step)*step;
  return Math.round(price/step)*step;
}

function calcZones(dailyCandles, todayOpen){
  // dailyCandles: array of {time,open,high,low,close} from 1D API
  // todayOpen: today's open price (raw API unit) or null
  const n=dailyCandles.length;
  if(n<200) return null;

  // Find today's date boundary (VN timezone)
  const now=new Date();
  const vnNow=new Date(now.getTime()+VN_OFFSET*1000);
  const todayStartSec=Date.UTC(vnNow.getUTCFullYear(),vnNow.getUTCMonth(),vnNow.getUTCDate(),0,0,0)/1000;

  // Filter out today's candle (use only closed candles for vol calc)
  const past=dailyCandles.filter(c=>c.time<todayStartSec);
  if(past.length<200) return null;

  // Compute rolling log-return std (volatility)
  const closes=past.map(c=>c.close);
  const logRet=closes.map((c,i)=>i>0?Math.log(c/closes[i-1]):0);
  logRet[0]=NaN;

  // Rolling std of last WINDOW_SIZE log returns
  const validRets=logRet.slice(-WINDOW_SIZE).filter(v=>!isNaN(v));
  if(validRets.length<200) return null;
  const mean=validRets.reduce((a,b)=>a+b,0)/validRets.length;
  const variance=validRets.reduce((a,v)=>a+(v-mean)**2,0)/validRets.length;
  const vol=Math.sqrt(variance);
  if(vol<=0) return null;

  // Previous day OHLC (last closed candle) — multiply by 1000 to VND
  const prev=past[past.length-1];
  const prevHigh=prev.high*1000;
  const prevLow=prev.low*1000;
  const prevClose=prev.close*1000;
  const realOpen=todayOpen?todayOpen*1000:0;

  // Ref calculation (gap up/down logic from init_zones.py)
  let ref;
  if(realOpen===0) ref=prevClose;
  else if(realOpen>=prevHigh||realOpen<=prevLow) ref=realOpen;
  else ref=(prevHigh+prevLow+prevClose)/3;

  // Band width factors
  const bidFactor=(vol/2)+(2*TRANS_FEE);
  const askFactor=(vol/2)+TRANS_FEE;

  const bid1=ref*(1-bidFactor);
  const ask1=ref*(1+askFactor);
  const width=ask1-bid1;

  return {
    ref:   roundPrice(ref)/1000,
    bid1:  roundPrice(bid1,'buy')/1000,
    ask1:  roundPrice(ask1,'sell')/1000,
    bid2:  roundPrice(bid1-0.6*width,'buy')/1000,
    ask2:  roundPrice(ask1+0.6*width,'sell')/1000,
    bid3:  roundPrice(bid1-1.5*width,'buy')/1000,
    ask3:  roundPrice(ask1+1.5*width,'sell')/1000,
    vol:   +(vol*100).toFixed(2), // % for display
    date:  prev.time
  };
}

// Cache zones in localStorage — 1 calc per symbol per day
function getVNDateStr(){
  const now=new Date();
  const vn=new Date(now.getTime()+VN_OFFSET*1000);
  return vn.getUTCFullYear()+'-'+String(vn.getUTCMonth()+1).padStart(2,'0')+'-'+String(vn.getUTCDate()).padStart(2,'0');
}
function getCachedZones(sym){
  try{
    const key='zones_'+sym+'_'+getVNDateStr();
    const raw=localStorage.getItem(key);
    if(!raw) return null;
    const z=JSON.parse(raw);
    // After 9:15 AM VN, if cache was computed without open, invalidate
    const now=new Date();
    const vnHour=(now.getUTCHours()+7)%24;
    const vnMin=now.getUTCMinutes();
    if(vnHour>=9&&vnMin>=15&&!z._hasOpen) return null;
    return z;
  }catch(e){return null;}
}
function setCachedZones(sym, zones, hasOpen){
  try{
    const key='zones_'+sym+'_'+getVNDateStr();
    zones._hasOpen=hasOpen;
    localStorage.setItem(key,JSON.stringify(zones));
    // Clean old keys (keep only today)
    const today=getVNDateStr();
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('zones_')&&!k.endsWith(today)) localStorage.removeItem(k);
    }
  }catch(e){}
}

async function fetchDaily(sym){
  try{
    const proxy=CFG.proxy.replace(/\/$/,'');
    const now=Math.floor(Date.now()/1000);
    const from=now-86400*730; // 2 years
    const r=await fetch(`${proxy}?resolution=1D&symbol=${sym}&from=${from}&to=${now}`);
    const j=await r.json();
    if(j.code!=='SUCCESS'||!j.data?.t) return null;
    return j.data.t.map((t,i)=>({time:t+VN_OFFSET,open:j.data.o[i],high:j.data.h[i],low:j.data.l[i],close:j.data.c[i],volume:j.data.v[i]}));
  }catch(e){console.warn('Daily API fail:',sym,e);return null;}
}

async function loadZones(sym){
  // Check cache first
  const cached=getCachedZones(sym);
  if(cached) return cached;

  // Fetch daily data
  const daily=await fetchDaily(sym);
  if(!daily||daily.length<200) return null;

  // Get today's open from the live 1m data if available
  const todayStart=getTodayStartUTC();
  let todayOpen=null;
  // Find today's candle in daily data
  const todayDaily=daily.find(c=>c.time>=todayStart);
  if(todayDaily) todayOpen=todayDaily.open;

  const zones=calcZones(daily, todayOpen);
  if(zones){
    setCachedZones(sym, zones, todayOpen!==null);
  }
  return zones;
}

// ======== REGIME INDICATORS ========

// Efficiency Ratio (Kaufman) — window = last 20 tf-candles
// ER near 0 = choppy/ranging, ER near 1 = trending
function calcER(candles, period=20){
  const n=candles.length;
  if(n<period+1) return null;
  const i=n-1;
  const direction=Math.abs(candles[i].close - candles[i-period].close);
  let noise=0;
  for(let j=i-period+1;j<=i;j++) noise+=Math.abs(candles[j].close - candles[j-1].close);
  return noise>0 ? +(direction/noise).toFixed(3) : 0;
}

// ADX — Wilder smoothing, period = 14
// ADX < 25 = no trend, ADX > 25 = trending
function calcADX(candles, period=14){
  const n=candles.length;
  if(n<period*2+1) return null;

  let sTR=0, sPDM=0, sNDM=0;
  // Seed: sum first `period` values
  for(let i=1;i<=period;i++){
    const c=candles[i],p=candles[i-1];
    const tr=Math.max(c.high-c.low, Math.abs(c.high-p.close), Math.abs(c.low-p.close));
    const up=c.high-p.high, dn=p.low-c.low;
    sTR+=tr;
    sPDM+=(up>dn&&up>0)?up:0;
    sNDM+=(dn>up&&dn>0)?dn:0;
  }

  // Wilder smooth remainder, collect DX for initial ADX seed
  let dxBuf=[], adx=null;
  for(let i=period+1;i<n;i++){
    const c=candles[i],p=candles[i-1];
    const tr=Math.max(c.high-c.low, Math.abs(c.high-p.close), Math.abs(c.low-p.close));
    const up=c.high-p.high, dn=p.low-c.low;
    sTR =sTR -sTR /period+tr;
    sPDM=sPDM-sPDM/period+((up>dn&&up>0)?up:0);
    sNDM=sNDM-sNDM/period+((dn>up&&dn>0)?dn:0);
    const pDI=sTR>0?100*sPDM/sTR:0;
    const nDI=sTR>0?100*sNDM/sTR:0;
    const diSum=pDI+nDI;
    const dx=diSum>0?100*Math.abs(pDI-nDI)/diSum:0;
    if(adx===null){
      dxBuf.push(dx);
      if(dxBuf.length===period){
        adx=dxBuf.reduce((a,b)=>a+b,0)/period;
      }
    } else {
      adx=adx-adx/period+dx;
    }
  }
  return adx!==null ? +adx.toFixed(1) : null;
}

// VWAP Cross Frequency — count price crosses over VWAP today only
// Higher = price is oscillating around VWAP = good MR environment
function calcXF(tc, todayStart){
  let xf=0, prevSide=null;
  for(const c of tc){
    if(c.time<todayStart) continue;
    if(c._vwap===undefined) continue;
    const side=c.close>c._vwap?1:-1;
    if(prevSide!==null&&side!==prevSide) xf++;
    prevSide=side;
  }
  return xf;
}

// Regime: RANGING / TRENDING / UNCERTAIN
function getRegime(er, adx){
  if(er===null||adx===null) return 'UNCERTAIN';
  if(er<0.3&&adx<25) return 'RANGING';
  if(er>0.6&&adx>25) return 'TRENDING';
  return 'UNCERTAIN';
}

// Color helpers — green=good for MR, red=bad, yellow=borderline
function erColor(er){
  if(er===null) return 'var(--t3)';
  if(er<0.3) return 'var(--green)';
  if(er<0.6) return 'var(--yellow)';
  return 'var(--red)';
}
function adxColor(adx){
  if(adx===null) return 'var(--t3)';
  if(adx<25) return 'var(--green)';
  if(adx<35) return 'var(--yellow)';
  return 'var(--red)';
}
function xfColor(xf){
  if(xf>=3) return 'var(--green)';
  if(xf>=1) return 'var(--yellow)';
  return 'var(--t3)';
}

// ======== DATA ENGINE ========
function agg(d,tf){
  if(tf===1)return d.map(c=>({...c}));
  const bk={};
  for(const c of d){const bt=Math.floor(c.time/(tf*60))*(tf*60);if(!bk[bt])bk[bt]={time:bt,open:c.open,high:c.high,low:c.low,close:c.close,volume:c.volume};else{const b=bk[bt];b.high=Math.max(b.high,c.high);b.low=Math.min(b.low,c.low);b.close=c.close;b.volume+=c.volume;}}
  return Object.values(bk).sort((a,b)=>a.time-b.time);
}

function calcVWAP(d){
  let cv=0,ct=0;
  return d.map((c,i)=>{
    const curDay=Math.floor(c.time/86400);
    const prevDay=i>0?Math.floor(d[i-1].time/86400):-1;
    if(i>0&&curDay!==prevDay){cv=0;ct=0;}
    const tp=(c.high+c.low+c.close)/3;
    ct+=tp*c.volume;cv+=c.volume;
    return{time:c.time,value:cv>0?ct/cv:c.close};
  });
}

function smpVWAP(v1m,tfc,tf){
  return tfc.map(c=>{let val=c.close;for(const v of v1m){if(v.time>=c.time&&v.time<c.time+tf*60)val=v.value;}return{time:c.time,value:+val.toFixed(4)};});
}

function calcATR(d,p){
  const a=2/(p+1);let atr=null;
  return d.map((c,i)=>{let tr;if(i===0){tr=c.high-c.low;atr=tr;}else{const pc=d[i-1].close,gap=c.time-d[i-1].time;tr=gap>5400?(c.high-c.low):Math.max(c.high-c.low,Math.abs(c.high-pc),Math.abs(c.low-pc));atr=a*tr+(1-a)*atr;}return{time:c.time,value:atr};});
}

function process(raw,tf,k,ap){
  const v1=calcVWAP(raw),tc=agg(raw,tf),vt=smpVWAP(v1,tc,tf),at=calcATR(tc,ap);
  const todayStart=getTodayStartUTC();

  const cd=[],vl=[],ul=[],ll=[],vd=[];
  let ld=0,lv=0,la=0,lp=0,lu=0,lo=0,tv=0;
  let prevSide=null, xf=0;

  for(let i=0;i<tc.length;i++){
    const c=tc[i],v=vt[i].value,a=at[i].value;
    const up=+(v+k*a).toFixed(2),dn=+(v-k*a).toFixed(2),dev=a>0?(c.close-v)/a:0;
    const isToday=c.time>=todayStart;

    cd.push({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close});
    vd.push({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(52,211,153,0.35)':'rgba(248,113,113,0.35)'});

    // Attach vwap value for XF calculation
    tc[i]._vwap=v;

    if(isToday){
      vl.push({time:c.time,value:+v.toFixed(2)});
      ul.push({time:c.time,value:up});
      ll.push({time:c.time,value:dn});
      tv+=c.volume;

      // VWAP cross frequency
      const side=c.close>v?1:-1;
      if(prevSide!==null&&side!==prevSide) xf++;
      prevSide=side;
    }

    ld=dev;lv=v;la=a;lp=c.close;lu=up;lo=dn;
  }

  // Regime indicators — use all tf candles (spans multiple days, enough data)
  const er=calcER(tc,20);
  const adx=calcADX(tc,ap);
  const regime=getRegime(er,adx);

  return{
    candles:cd,vwapLine:vl,upperLine:ul,lowerLine:ll,volData:vd,
    m:{dev:ld,vwap:lv,atr:la,price:lp,upper:lu,lower:lo,vol:tv,er,adx,xf,regime}
  };
}

// ======== API ========
let fetchOK=true;
async function fetchSSI(sym,from,to){
  try{
    const proxy=CFG.proxy.replace(/\/$/,'');
    const r=await fetch(`${proxy}?resolution=1&symbol=${sym}&from=${from}&to=${to}`);
    const j=await r.json();
    if(j.code!=='SUCCESS'||!j.data?.t)return null;
    if(!fetchOK){fetchOK=true;hideWarn();}
    return j.data.t.map((t,i)=>({time:t+VN_OFFSET,open:j.data.o[i],high:j.data.h[i],low:j.data.l[i],close:j.data.c[i],volume:j.data.v[i]}));
  }catch(e){console.warn('API fail:',sym,e);if(fetchOK){fetchOK=false;showWarn();}return null;}
}
async function fetchLive(sym){const now=Math.floor(Date.now()/1000);return await fetchSSI(sym,now-3*86400,now);}

// ======== WARNING ========
function showWarn(){document.getElementById('warn').classList.add('show');}
function hideWarn(){document.getElementById('warn').classList.remove('show');}
document.getElementById('proxy-save').addEventListener('click',()=>{const v=document.getElementById('proxy-input').value.trim();if(!v)return;CFG.proxy=(v.startsWith('http')?v:'https://'+v);localStorage.setItem('ssi-proxy',CFG.proxy);fetchOK=true;hideWarn();loadAll();});
document.getElementById('warn-close').addEventListener('click',hideWarn);

// ======== CHART PANEL ========
class Panel{
  constructor(cid,sym,idx){
    this.sym=sym;this.idx=idx;this.raw=[];
    this.cell=document.getElementById(cid);
    this.ch=null;this.cs=null;this.vs=null;this.ws=null;this.us=null;this.ls=null;
    this.initialized=false;
    this.zones=null;this.zoneSeries=[];
    this.build();
  }

  build(){
    const i=this.idx;
    this.cell.innerHTML=`
<div class="cell-head mono">
  <div style="display:flex;align-items:center;gap:8px">
    <input class="sym-input mono" value="${this.sym}" maxlength="6" id="si-${i}">
    <span class="dot dot-live" id="dt-${i}"></span>
  </div>
  <div class="price-info mono">
    <span class="price-main" id="pr-${i}" style="color:var(--neutral)">—</span>
    <span id="pc-${i}" style="font-size:12px;color:var(--t3)"></span>
  </div>
</div>
<div class="chart-wrap" id="cw-${i}"></div>
<div class="dev-badge dev-neutral mono" id="db-${i}"><small>DEV</small>—</div>
<div class="metrics mono">
  <span><span class="ml">VWAP </span><span class="mv" style="color:var(--yellow)" id="mv-${i}">—</span></span>
  <span><span class="ml">ATR </span><span class="mv" style="color:var(--cyan)" id="ma-${i}">—</span></span>
  <span><span class="ml">Vol </span><span class="mv" id="mV-${i}">—</span></span>
  <span><span class="ml">Band </span><span class="mv" style="color:var(--t2)" id="mb-${i}">—</span></span>
  <div class="msep"></div>
  <span class="regime-lbl regime-uncertain" id="mrg-${i}">—</span>
  <span><span class="ml">ER </span><span class="mv" id="mer-${i}">—</span></span>
  <span><span class="ml">ADX </span><span class="mv" id="madx-${i}">—</span></span>
  <span><span class="ml">XF </span><span class="mv" id="mxf-${i}">—</span></span>
</div>`;
    document.getElementById(`si-${i}`).addEventListener('change',e=>{this.sym=e.target.value.toUpperCase();e.target.value=this.sym;this.initialized=false;this.zones=null;this.load();});
    this.mkChart();
  }

  mkChart(){
    const el=document.getElementById(`cw-${this.idx}`);
    this.ch=LightweightCharts.createChart(el,{
      layout:{background:{color:'#080c14'},textColor:'#64748b',fontSize:11,fontFamily:'JetBrains Mono'},
      grid:{vertLines:{color:'rgba(30,42,66,0.3)'},horzLines:{color:'rgba(30,42,66,0.3)'}},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'rgba(34,211,238,0.2)',width:1,style:2,labelBackgroundColor:'#1c2740'},horzLine:{color:'rgba(34,211,238,0.2)',width:1,style:2,labelBackgroundColor:'#1c2740'}},
      rightPriceScale:{borderColor:'#1e2a42',scaleMargins:{top:0.06,bottom:0.22},textColor:'#94a3b8'},
      timeScale:{borderColor:'#1e2a42',timeVisible:true,secondsVisible:false,rightOffset:5},
      localization:{timeFormatter:ts=>{const d=new Date(ts*1000);return d.getUTCHours().toString().padStart(2,'0')+':'+d.getUTCMinutes().toString().padStart(2,'0');}},
    });
    this.cs=this.ch.addCandlestickSeries({upColor:'#34d399',downColor:'#f87171',borderUpColor:'#34d399',borderDownColor:'#f87171',wickUpColor:'#34d39988',wickDownColor:'#f8717188'});
    this.vs=this.ch.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol'});
    this.ch.priceScale('vol').applyOptions({scaleMargins:{top:0.78,bottom:0}});
    this.ws=this.ch.addLineSeries({color:'#facc15',lineWidth:2,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:true,crosshairMarkerRadius:3});
    this.us=this.ch.addLineSeries({color:'rgba(248,113,113,0.7)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    this.ls=this.ch.addLineSeries({color:'rgba(52,211,153,0.7)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});

    // Zone line series: [B1, B2, B3, A1, A2, A3]
    const zoneOpts=[
      {color:'rgba(52,211,153,0.50)', lineWidth:2, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(52,211,153,0.25)', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(52,211,153,0.18)', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(248,113,113,0.50)',lineWidth:2, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(248,113,113,0.25)',lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted},
      {color:'rgba(248,113,113,0.18)',lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dotted},
    ];
    this.zoneSeries=zoneOpts.map(o=>this.ch.addLineSeries({...o,priceLineVisible:false,lastValueVisible:true,crosshairMarkerVisible:false,title:''}));

    // Scroll wheel zoom on price scale
    const chart=this.ch;
    let margins={top:0.06,bottom:0.22};
    el.addEventListener('wheel',e=>{
      // Only trigger when mouse is on the right ~55px (price scale area)
      const rect=el.getBoundingClientRect();
      if(e.clientX < rect.right-55) return;
      e.preventDefault();
      const delta=e.deltaY>0?0.02:-0.02;
      margins.top=Math.max(0.01,Math.min(0.4,margins.top+delta));
      margins.bottom=Math.max(0.05,Math.min(0.5,margins.bottom+delta));
      chart.priceScale('right').applyOptions({autoScale:true,scaleMargins:{top:margins.top,bottom:margins.bottom}});
    },{passive:false});

    new ResizeObserver(()=>{this.ch.applyOptions({width:el.clientWidth,height:el.clientHeight});}).observe(el);
  }

  async load(){
    const data=await fetchLive(this.sym);
    if(data&&data.length){this.raw=data;document.getElementById(`dt-${this.idx}`).className='dot dot-live';}
    else{document.getElementById(`dt-${this.idx}`).className='dot dot-err';}
    // Load zones (cached or computed — 1x per day per symbol)
    if(!this.zones) this.zones=await loadZones(this.sym);
    this.render();
  }

  render(){
    if(!this.raw.length)return;
    const{candles,vwapLine,upperLine,lowerLine,volData,m}=process(this.raw,CFG.tf,CFG.k,CFG.atrPeriod);
    const i=this.idx;

    this.cs.setData(candles);
    this.vs.setData(volData);
    this.ws.setData(vwapLine);
    this.us.setData(upperLine);
    this.ls.setData(lowerLine);

    // Price header
    const pct=m.vwap?((m.price-m.vwap)/m.vwap*100):0;
    const col=pct>0?'var(--green)':pct<0?'var(--red)':'var(--neutral)';
    document.getElementById(`pr-${i}`).textContent=m.price.toFixed(2);
    document.getElementById(`pr-${i}`).style.color=col;
    document.getElementById(`pc-${i}`).textContent=(pct>=0?'+':'')+pct.toFixed(2)+'%';
    document.getElementById(`pc-${i}`).style.color=col;

    // Metrics bar — left side
    document.getElementById(`mv-${i}`).textContent=m.vwap.toFixed(2);
    document.getElementById(`ma-${i}`).textContent=m.atr.toFixed(3);
    document.getElementById(`mV-${i}`).textContent=fmtVol(m.vol);
    document.getElementById(`mb-${i}`).textContent=m.lower.toFixed(2)+' – '+m.upper.toFixed(2);

    // Metrics bar — regime section
    const rgEl=document.getElementById(`mrg-${i}`);
    rgEl.textContent=m.regime;
    rgEl.className='regime-lbl '+(
      m.regime==='RANGING'  ? 'regime-ranging'  :
      m.regime==='TRENDING' ? 'regime-trending' : 'regime-uncertain'
    );

    const erEl=document.getElementById(`mer-${i}`);
    erEl.textContent=m.er!==null?m.er.toFixed(2):'—';
    erEl.style.color=erColor(m.er);

    const adxEl=document.getElementById(`madx-${i}`);
    adxEl.textContent=m.adx!==null?m.adx.toFixed(1):'—';
    adxEl.style.color=adxColor(m.adx);

    const xfEl=document.getElementById(`mxf-${i}`);
    xfEl.textContent=m.xf;
    xfEl.style.color=xfColor(m.xf);

    // DEV badge — dim when trending (signal less reliable)
    const db=document.getElementById(`db-${i}`);
    const dev=m.dev;
    let z='NEUTRAL',dc='dev-neutral';
    if(dev<=-CFG.k){z='LONG ZONE';dc='dev-long';}
    else if(dev>=CFG.k){z='SHORT ZONE';dc='dev-short';}
    db.className='dev-badge mono '+dc+(m.regime==='TRENDING'?' dimmed':'');
    db.innerHTML=`<small>${z}</small>${dev>=0?'+':''}${dev.toFixed(2)}`;

    // Zone lines (LineSeries — today only)
    if(this.zones && this.zoneSeries.length===6){
      const zn=this.zones;
      const todayStart=getTodayStartUTC();
      // Find today's candle time range
      const todayCandles=candles.filter(c=>c.time>=todayStart);
      const tStart=todayCandles.length?todayCandles[0].time:todayStart;
      const tEnd=todayCandles.length>1?todayCandles[todayCandles.length-1].time:(tStart+CFG.tf*60);
      const prices=[zn.bid1,zn.bid2,zn.bid3,zn.ask1,zn.ask2,zn.ask3];
      const zl=CFG.zoneLevel; // 0=off, 1=Z1 only, 3=all
      for(let j=0;j<6;j++){
        const isZ1=(j===0||j===3);
        const show=(zl===3)||(zl===1&&isZ1);
        if(show && tStart<tEnd){
          this.zoneSeries[j].setData([{time:tStart,value:prices[j]},{time:tEnd,value:prices[j]}]);
        } else {
          this.zoneSeries[j].setData([]);
        }
      }
    } else {
      // No zones — clear all
      this.zoneSeries.forEach(s=>s.setData([]));
    }

    // Initial zoom
    if(!this.initialized&&candles.length>0){
      this.initialized=true;
      const todayStart=getTodayStartUTC();
      let todayIdx=candles.findIndex(c=>c.time>=todayStart);
      if(todayIdx<0) todayIdx=Math.max(0,candles.length-50);
      const fromIdx=Math.max(0,todayIdx-10);
      this.ch.timeScale().setVisibleLogicalRange({from:fromIdx,to:candles.length+3});
    }
  }
}

// ======== DASHBOARD ========
const panels=[];let rTimer=null;
async function loadAll(){for(const p of panels){await p.load();await new Promise(r=>setTimeout(r,1100));}}
function renderAll(){panels.forEach(p=>{p.initialized=false;p.render();});}
function startRefresh(){if(rTimer)clearInterval(rTimer);rTimer=setInterval(()=>loadAll(),CFG.refresh*1000);}

function setupBG(id,cb){document.getElementById(id).addEventListener('click',e=>{if(!e.target.classList.contains('btn'))return;document.getElementById(id).querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');cb(e.target.dataset.v);});}
document.getElementById('k-range').addEventListener('input',e=>{CFG.k=parseFloat(e.target.value);document.getElementById('k-val').textContent=CFG.k.toFixed(1);panels.forEach(p=>p.render());});
document.getElementById('atr-range').addEventListener('input',e=>{CFG.atrPeriod=parseInt(e.target.value);document.getElementById('atr-val').textContent=CFG.atrPeriod;panels.forEach(p=>p.render());});
setupBG('ref-btns',v=>{CFG.refresh=parseInt(v);startRefresh();});
setupBG('tf-btns',v=>{CFG.tf=parseInt(v);renderAll();});
setupBG('zone-btns',v=>{CFG.zoneLevel=parseInt(v);panels.forEach(p=>p.render());});

if(typeof LightweightCharts==='undefined'){
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#94a3b8"><div><h2 style="color:#22d3ee">VWAP.MR</h2><p>Không load được chart library. Cần internet.</p></div></div>';
}else{
  for(let i=0;i<4;i++)panels.push(new Panel('c'+i,CFG.symbols[i],i));
  loadAll();startRefresh();
}
